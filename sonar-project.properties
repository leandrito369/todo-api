sonar.projectKey=leandrito369_todo-api
sonar.organization=leandrolobayan

# Información del proyecto
sonar.projectName=todo-api
sonar.projectVersion=1.0

# Rutas del código fuente y tests (estructura backend/frontend desde TP8)
sonar.sources=backend/app
sonar.tests=backend/tests
sonar.language=py

# Exclusiones
sonar.exclusions=**/__pycache__/**,**/*.pyc,frontend/**

# Cobertura (requiere pytest-cov)
sonar.python.coverage.reportPaths=backend/coverage.xml
